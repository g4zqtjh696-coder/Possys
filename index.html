<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shift Tracker</title>
    <style>
        /* Mobile-optimized reset to prevent zooming and text selection during fast tapping */
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; user-select: none; touch-action: manipulation; }
        body { margin: 0; padding: 0; background-color: #121212; color: #ffffff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Initial Fond de Caisse Screen */
        #setup-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 20px; text-align: center; }
        input { font-size: 28px; padding: 15px; width: 100%; max-width: 300px; text-align: center; border-radius: 12px; border: none; margin: 20px 0; background: #2c2c2e; color: white; outline: none; }
        button { font-size: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: transform 0.05s; }
        button:active { transform: scale(0.95); filter: brightness(0.9); }
        .start-btn { background-color: #0a84ff; color: white; width: 100%; max-width: 300px; padding: 18px; font-size: 20px; }

        /* Main Tracker UI */
        #app-screen { display: none; flex-direction: column; height: 100%; }
        
        .header { display: flex; justify-content: space-between; padding: 25px 20px; background-color: #1c1c1e; border-bottom: 1px solid #38383a; }
        .stat-box { text-align: center; width: 48%; }
        .stat-label { font-size: 13px; color: #ebebf5; opacity: 0.6; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 32px; font-weight: 800; }
        .text-blue { color: #0a84ff; }
        .text-red { color: #ff453a; }
        .text-green { color: #32d74b; }

        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 40px; }
        .section { margin-bottom: 30px; }
        .section-title { font-size: 14px; color: #8e8e93; margin-bottom: 12px; text-transform: uppercase; font-weight: 600; }
        
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .btn-grid.tips { grid-template-columns: repeat(5, 1fr); }
        
        /* Button Styling */
        .btn-order { background-color: #ff453a; color: white; height: 70px; font-size: 22px; }
        .btn-pay { background-color: #32d74b; color: #000; height: 70px; font-size: 22px; }
        .btn-tip { background-color: #ffd60a; color: #000; height: 60px; font-size: 20px; }
    </style>
</head>
<body>

<!-- Setup Screen -->
<div id="setup-screen">
    <h2 style="margin:0; color: #f2f2f7;">Start Shift</h2>
    <p style="color: #8e8e93; margin-top: 5px;">Enter starting pocket cash (Fond de Caisse)</p>
    <input type="number" id="fond-input" placeholder="0 DH" inputmode="numeric">
    <button class="start-btn" onclick="startShift()">Open Caisse</button>
</div>

<!-- Main App Screen -->
<div id="app-screen">
    <div class="header">
        <div class="stat-box">
            <div class="stat-label">In Pocket</div>
            <div class="stat-value text-blue" id="pocket-display">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Unpaid Tables</div>
            <div class="stat-value text-green" id="unpaid-display">0</div>
        </div>
    </div>

    <div class="scroll-area">
        <div class="section">
            <div class="section-title">1. New Order Served (To pay later)</div>
            <div class="btn-grid">
                <button class="btn-order" onclick="addOrder(3)">+3</button>
                <button class="btn-order" onclick="addOrder(11)">+11</button>
                <button class="btn-order" onclick="addOrder(15)">+15</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">2. Customer Paid (Add to Pocket)</div>
            <div class="btn-grid">
                <button class="btn-pay" onclick="addPay(3)">+3</button>
                <button class="btn-pay" onclick="addPay(11)">+11</button>
                <button class="btn-pay" onclick="addPay(15)">+15</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">3. Pourboire (Kept in pocket)</div>
            <div class="btn-grid tips">
                <button class="btn-tip" onclick="addTip(1)">+1</button>
                <button class="btn-tip" onclick="addTip(2)">+2</button>
                <button class="btn-tip" onclick="addTip(3)">+3</button>
                <button class="btn-tip" onclick="addTip(4)">+4</button>
                <button class="btn-tip" onclick="addTip(5)">+5</button>
            </div>
        </div>
    </div>
</div>

<script>
    let fond = 0;
    let totalOrders = 0;
    let totalPaid = 0;
    let totalTips = 0;

    function startShift() {
        const input = document.getElementById('fond-input').value;
        fond = parseFloat(input) || 0;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        updateUI();
    }

    // Adds value to the Unpaid Tables pool
    function addOrder(amount) {
        totalOrders += amount;
        updateUI();
    }

    // Subtracts from Unpaid Tables, adds to Pocket
    function addPay(amount) {
        totalPaid += amount;
        updateUI();
    }

    // Adds strictly to Pocket without affecting order balance
    function addTip(amount) {
        totalTips += amount;
        updateUI();
    }

    function updateUI() {
        // Pocket calculates the original float, plus payments made, plus tips.
        const pocket = fond + totalPaid + totalTips;
        // Unpaid evaluates what was sent to tables minus what has been collected.
        const unpaid = totalOrders - totalPaid;

        document.getElementById('pocket-display').innerText = pocket + ' DH';
        
        const unpaidEl = document.getElementById('unpaid-display');
        unpaidEl.innerText = unpaid + ' DH';
        
        // Color coding for visual speed
        if (unpaid > 0) {
            unpaidEl.className = 'stat-value text-red';
        } else {
            unpaidEl.className = 'stat-value text-green';
        }
    }
</script>
</body>
</html>
